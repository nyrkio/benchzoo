# Minimal nginx config serving a single static page on port 8080.
#
# Used by run.sh as the HTTP target for a JMeter load test. The config
# is deliberately tiny: a single server block, a single location, a
# single document root. We want JMeter's measurements to reflect
# JMeter + nginx's static-file fast path — no upstream, no PHP, no TLS —
# so the numbers are as stable as we can make them on a shared CI
# runner.
#
# Paths assume nginx is invoked with `-p $(pwd)` and `-c nginx.conf`,
# which places the `logs/` and `client_body_temp/` directories beneath
# the current framework directory rather than at system-wide locations
# that would require root. The `daemon off` / `master_process off`
# settings keep nginx in the foreground so run.sh can background and
# later `kill` it by PID.

worker_processes  1;
daemon            off;
master_process    off;
pid               nginx.pid;
error_log         nginx-error.log warn;

events {
    worker_connections  1024;
}

http {
    access_log        off;
    sendfile          on;
    keepalive_timeout 65;
    default_type      text/html;

    client_body_temp_path  client_body_temp;
    proxy_temp_path        proxy_temp;
    fastcgi_temp_path      fastcgi_temp;
    uwsgi_temp_path        uwsgi_temp;
    scgi_temp_path         scgi_temp;

    server {
        listen      8080;
        server_name localhost;
        root        .;

        location / {
            try_files /index.html =404;
        }
    }
}
