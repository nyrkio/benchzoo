name: locust

on:
  push:
    branches: [main]
    paths:
      - 'frameworks/loadtest/locust/**'
      - '.github/workflows/locust.yml'
  pull_request:
    paths:
      - 'frameworks/loadtest/locust/**'
      - '.github/workflows/locust.yml'
  workflow_dispatch:

# No `schedule:` trigger — Locust does not implement test 4 of the
# canonical sample benchmark (see README for the deviation rationale),
# so there is no change-detection time series for this framework to
# accumulate.

permissions:
  contents: read

concurrency:
  group: locust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frameworks/loadtest/locust
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: frameworks/loadtest/locust/requirements.txt

      - name: Install Locust
        run: pip install -r requirements.txt

      - name: Install nginx
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx

      - name: Run sample benchmark
        run: ./run.sh

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: locust-output
          path: |
            frameworks/loadtest/locust/output_stats.csv
            frameworks/loadtest/locust/output_failures.csv
            frameworks/loadtest/locust/output_stats_history.csv
            frameworks/loadtest/locust/output.txt
          if-no-files-found: error
