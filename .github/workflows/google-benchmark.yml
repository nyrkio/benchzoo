name: google-benchmark

on:
  push:
    branches: [main]
    paths:
      - 'frameworks/language/google-benchmark/**'
      - '.github/workflows/google-benchmark.yml'
  pull_request:
    paths:
      - 'frameworks/language/google-benchmark/**'
      - '.github/workflows/google-benchmark.yml'
  workflow_dispatch:
  schedule:
    # Daily at 12:00 UTC for the test 4 change-detection showcase.
    # Avoid 0 0 * * * — month boundary ambiguity.
    - cron: '0 12 * * *'

permissions:
  contents: read

concurrency:
  group: google-benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frameworks/language/google-benchmark
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest already has cmake and g++ preinstalled, so no
      # setup-* action is needed. FetchContent in CMakeLists.txt pulls
      # google/benchmark at configure time from a pinned tag — that's
      # what makes the captured fixture reproducible.

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: frameworks/language/google-benchmark/build
          key: google-benchmark-build-${{ runner.os }}-${{ hashFiles('frameworks/language/google-benchmark/CMakeLists.txt') }}
          restore-keys: |
            google-benchmark-build-${{ runner.os }}-

      - name: Run sample benchmark
        run: ./run.sh

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-benchmark-output
          path: |
            frameworks/language/google-benchmark/output.json
            frameworks/language/google-benchmark/output.csv
            frameworks/language/google-benchmark/output.txt
          if-no-files-found: error
