name: mitata

on:
  push:
    branches: [main]
    paths:
      - 'frameworks/language/mitata/**'
      - '.github/workflows/mitata.yml'
  pull_request:
    paths:
      - 'frameworks/language/mitata/**'
      - '.github/workflows/mitata.yml'
  workflow_dispatch:
  schedule:
    # Daily at 12:00 UTC for the test 4 change-detection showcase.
    # Avoid 0 0 * * * — month boundary ambiguity.
    - cron: '0 12 * * *'

permissions:
  contents: read

concurrency:
  group: mitata-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frameworks/language/mitata
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frameworks/language/mitata/package.json

      - name: Run sample benchmark
        run: bash run.sh

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mitata-output
          path: frameworks/language/mitata/output.json
          if-no-files-found: error
