name: catch2

on:
  push:
    branches: [main]
    paths:
      - 'frameworks/language/catch2/**'
      - '.github/workflows/catch2.yml'
  pull_request:
    paths:
      - 'frameworks/language/catch2/**'
      - '.github/workflows/catch2.yml'
  workflow_dispatch:
  schedule:
    # Daily at 12:00 UTC for the test 4 change-detection showcase.
    # Avoid 0 0 * * * — month boundary ambiguity.
    - cron: '0 12 * * *'

permissions:
  contents: read

concurrency:
  group: catch2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frameworks/language/catch2
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest already has cmake and g++ preinstalled, so no
      # setup-* action is needed. FetchContent in CMakeLists.txt pulls
      # Catch2 at configure time from a pinned tag — that's what makes
      # the captured fixture reproducible.

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: frameworks/language/catch2/build
          key: catch2-build-${{ runner.os }}-${{ hashFiles('frameworks/language/catch2/CMakeLists.txt') }}
          restore-keys: |
            catch2-build-${{ runner.os }}-

      - name: Run sample benchmark
        run: ./run.sh

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: catch2-output
          path: |
            frameworks/language/catch2/output.txt
            frameworks/language/catch2/output.xml
            frameworks/language/catch2/output.junit.xml
            frameworks/language/catch2/output.json
          if-no-files-found: error
