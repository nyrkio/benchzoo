name: benchmark-js

on:
  push:
    branches: [main]
    paths:
      - 'frameworks/language/benchmark-js/**'
      - '.github/workflows/benchmark-js.yml'
  pull_request:
    paths:
      - 'frameworks/language/benchmark-js/**'
      - '.github/workflows/benchmark-js.yml'
  workflow_dispatch:
  schedule:
    # Daily at 12:00 UTC for the test 4 change-detection showcase.
    # Avoid 0 0 * * * — month boundary ambiguity.
    - cron: '0 12 * * *'

permissions:
  contents: read

concurrency:
  group: benchmark-js-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frameworks/language/benchmark-js
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sample benchmark
        run: bash run.sh

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-js-output
          path: frameworks/language/benchmark-js/output.json
          if-no-files-found: error
