name: wrk2

on:
  push:
    branches: [main]
    paths:
      - 'frameworks/loadtest/wrk2/**'
      - '.github/workflows/wrk2.yml'
  pull_request:
    paths:
      - 'frameworks/loadtest/wrk2/**'
      - '.github/workflows/wrk2.yml'
  workflow_dispatch:

# No `schedule:` trigger — wrk2 does not implement test 4 of the
# canonical sample benchmark (see README for the deviation rationale),
# so there is no change-detection time series for this framework to
# accumulate.

permissions:
  contents: read

concurrency:
  group: wrk2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frameworks/loadtest/wrk2
    steps:
      - uses: actions/checkout@v4

      - name: Install nginx and wrk2 build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx build-essential libssl-dev libz-dev git

      # wrk2 is not in apt and has no git tags. Pin a specific commit
      # so the captured fixture is a function of a known upstream
      # revision. The upstream binary is called `wrk`; we install it
      # as `wrk2` to make run.sh invocations unambiguous and to avoid
      # shadowing any system `wrk` package.
      - name: Build and install wrk2 from source
        working-directory: /tmp
        run: |
          git clone https://github.com/giltene/wrk2.git
          cd wrk2
          git checkout 44a94c17d8e6a0bac8559b53da76848e430cb7a7
          make
          sudo cp wrk /usr/local/bin/wrk2
          wrk2 --version || true

      - name: Run sample benchmark
        run: bash run.sh

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wrk2-output
          path: frameworks/loadtest/wrk2/output.txt
          if-no-files-found: error
