name: cypress

on:
  push:
    branches: [main]
    paths:
      - 'frameworks/unit-or-qa/cypress/**'
      - '.github/workflows/cypress.yml'
  pull_request:
    paths:
      - 'frameworks/unit-or-qa/cypress/**'
      - '.github/workflows/cypress.yml'
  workflow_dispatch:
  schedule:
    # Daily at 12:00 UTC for the test 4 change-detection showcase.
    # Avoid 0 0 * * * — month boundary ambiguity.
    - cron: '0 12 * * *'

permissions:
  contents: read

concurrency:
  group: cypress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frameworks/unit-or-qa/cypress
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # cypress-io/github-action requires a package-lock.json; we
      # deliberately don't ship one (the pinned versions in
      # package.json are our stable contract). Install and run
      # manually instead.
      - name: Install Cypress
        run: |
          npm install
          npx cypress install
          npx cypress verify

      - name: Run sample benchmark
        run: npx cypress run --headless --browser=electron

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypress-output
          path: frameworks/unit-or-qa/cypress/output.xml
          if-no-files-found: error
